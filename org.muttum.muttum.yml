id: org.muttum.muttum
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: muttum
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
modules:
  - name: data
    buildsystem: simple
    build-commands:
      - install -Dm644 -t /app/share/dict en-US
      - install -Dm644 -t /app/share/dict en-AU
      - install -Dm644 -t /app/share/dict en-GB
      - install -Dm644 -t /app/share/dict en-CA
      - install -Dm644 -t /app/share/dict en.license
      - install -Dm644 -t /app/share/dict de-AT
      - install -Dm644 -t /app/share/dict de-CH
      - install -Dm644 -t /app/share/dict de-DE
      - install -Dm644 -t /app/share/dict de.license
      - install -Dm644 -t /app/share/dict fr
      - install -Dm644 -t /app/share/dict fr.license
      - install -Dm644 -t /app/etc/xdg/org.muttum.muttum muttum.toml
    sources:
      - type: archive
        url: "https://gitlab.adorsaz.ch/muttum/muttum/-/releases/\
              26.03.1/downloads/dist/dictionaries-26.03.1.tar.xz"
        sha256: cc92cccf7b4d03a53952508dd67fcc9c1341c0dea545ff4a12390f492ce73b2a
  - name: muttum
    buildsystem: meson
    build-options:
      env:
        CARGO_NET_OFFLINE: 'true'
    config-opts:
      - -Dbuildtype=release
      - -Dgnome=true
    sources:
      - type: archive
        url: "https://gitlab.adorsaz.ch/muttum/muttum/-/releases/\
              26.03.1/downloads/dist/muttum-26.03.1.tar.xz"
        sha256: b3f93459f4ae45d15908ba40aa161f7221528aea44f394741f040b8462c9bb67
