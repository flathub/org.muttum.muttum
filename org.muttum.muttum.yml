id: org.muttum.muttum
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: muttum
finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - "*.la"
  - "*.a"
modules:
  - name: data
    buildsystem: simple
    build-commands:
      - install -Dm644 en-US /app/share/org.muttum.muttum/en-US
      - install -Dm644 en-AU /app/share/org.muttum.muttum/en-AU
      - install -Dm644 en-GB /app/share/org.muttum.muttum/en-GB
      - install -Dm644 en-CA /app/share/org.muttum.muttum/en-CA
      - install -Dm644 en.license /app/share/org.muttum.muttum/en.license
      - install -Dm644 de-AT /app/share/org.muttum.muttum/de-AT
      - install -Dm644 de-CH /app/share/org.muttum.muttum/de-CH
      - install -Dm644 de-DE /app/share/org.muttum.muttum/de-DE
      - install -Dm644 de.license /app/share/org.muttum.muttum/de.license
      - install -Dm644 fr /app/share/org.muttum.muttum/fr
      - install -Dm644 fr.license /app/share/org.muttum.muttum/fr.license
      - install -Dm644 muttum.toml /app/etc/xdg/org.muttum.muttum/muttum.toml
    sources:
      - type: archive
        url: "https://gitlab.adorsaz.ch/muttum/muttum/-/releases/\
              25.11.1/downloads/dist/dictionaries-25.11.1.tar.xz"
        sha256: fe743bcedfaab19adc94922a27cd2e16104f7c0488fb6a4312f8c63f0a0f7374
  - name: muttum
    buildsystem: meson
    build-options:
      env:
        CARGO_NET_OFFLINE: 'true'
    config-opts:
      - -Dbuildtype=release
    sources:
      - type: archive
        url: "https://gitlab.adorsaz.ch/muttum/muttum/-/releases/\
              25.11.1/downloads/dist/muttum-25.11.1.tar.xz"
        sha256: f1e5aa366165d95473505a3c27f778406ff1b22ce6753d5c8d1434b410745fec
